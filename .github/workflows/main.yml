name: 🏗️ Build Yalla Goal APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

# ══════════════════════════════════════════════════════
# 📌 متطلبات المستودع — ضع هذه الملفات في الجذر:
#   - index.html        ← ملف التطبيق
#   - icon.png          ← أيقونة مربعة 1024×1024 (خلفية)
#   - icon_fg.png       ← أيقونة foreground بخلفية شفافة (اختياري)
# ══════════════════════════════════════════════════════

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      # ─────────────────────────────────────────
      # 1. استنساخ المستودع
      # ─────────────────────────────────────────
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: ☕ Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 Install Android Build Tools
        run: |
          sdkmanager --sdk_root=$ANDROID_SDK_ROOT \
            "build-tools;34.0.0" \
            "platforms;android-34" \
            "platform-tools"

      - name: 🖼️ Install ImageMagick
        run: sudo apt-get install -y imagemagick

      # ─────────────────────────────────────────
      # 2. إنشاء هيكل المشروع
      # ─────────────────────────────────────────
      - name: 🗂️ Create Project Structure
        run: |
          mkdir -p yalla-goal/www

          # نسخ index.html — جرّب الاسمين
          if [ -f "index.html" ]; then
            cp index.html yalla-goal/www/index.html
            echo "✅ نُسخ index.html"
          elif [ -f "tindex.html" ]; then
            cp index.html yalla-goal/www/index.html
            echo "✅ نُسخ index.html → index.html"
          else
            echo "❌ لم يُعثر على index.html أو index.html"
            exit 1
          fi

          echo "=== www ==="
          ls -lh yalla-goal/www/

          cat > yalla-goal/package.json << 'EOF'
          {
            "name": "yalla-goal",
            "version": "2.3.0",
            "scripts": { "build": "echo ok" }
          }
          EOF

      # ─────────────────────────────────────────
      # 3. Capacitor
      # ─────────────────────────────────────────
      - name: 📥 Install Capacitor
        run: |
          cd yalla-goal
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: ⚙️ Capacitor Config
        run: |
          cat > yalla-goal/capacitor.config.json << 'EOF'
          {
            "appId": "com.yallagoal.app",
            "appName": "YallaGoal",
            "webDir": "www",
            "server": {
              "androidScheme": "https",
              "cleartext": true,
              "allowNavigation": ["*"]
            },
            "android": {
              "allowMixedContent": true,
              "captureInput": true,
              "webContentsDebuggingEnabled": false
            }
          }
          EOF

      - name: 🤖 Add Android Platform
        run: |
          cd yalla-goal
          npx cap add android

      # ─────────────────────────────────────────
      # 4. cap sync — يبني assets من www
      # ─────────────────────────────────────────
      - name: 🔄 Capacitor Sync
        run: |
          cd yalla-goal
          npx cap sync android

      # ─────────────────────────────────────────
      # 5. تأكيد وجود index.html في assets (بعد sync)
      # ─────────────────────────────────────────
      - name: 📄 Verify index.html in assets
        run: |
          ASSETS="yalla-goal/android/app/src/main/assets/public"
          mkdir -p "$ASSETS"

          if [ ! -f "$ASSETS/index.html" ]; then
            echo "⚠️  لم يجد cap sync الملف، نسخ يدوي..."
            cp yalla-goal/www/index.html "$ASSETS/index.html"
          fi

          echo "✅ assets/public:"
          ls -lh "$ASSETS/"

      # ─────────────────────────────────────────
      # 6. 🖼️ توليد الأيقونات (خلفية + ظاهرية + Adaptive)
      #    يستخدم icon.png من المستودع
      #    إن لم يوجد يُحمّل من رابطك
      # ─────────────────────────────────────────
      - name: 🖼️ Generate All App Icons
        run: |
          # ── تحضير مصدر الأيقونة ──
          if [ -f "icon.png" ]; then
            cp icon.png /tmp/icon_src.png
            echo "✅ icon.png من المستودع"
          else
            echo "⬇️  تحميل الأيقونة من الرابط..."
            curl -fsSL "https://i.ibb.co/CKJ5NVv7/Screenshot-2026-04-21-1-52-19-PM.png" \
              -o /tmp/icon_src.png
            echo "✅ تم التحميل"
          fi

          # ── تحضير مصدر الـ foreground ──
          if [ -f "icon_fg.png" ]; then
            cp icon_fg.png /tmp/icon_fg.png
            echo "✅ icon_fg.png من المستودع"
          else
            # استخدام نفس الصورة كـ foreground مع padding
            cp /tmp/icon_src.png /tmp/icon_fg.png
          fi

          echo "مصدر الأيقونة: $(identify /tmp/icon_src.png | head -1)"

          BASE="yalla-goal/android/app/src/main/res"

          # ── أحجام mipmap القياسية ──
          declare -A SIZES=(
            ["mipmap-mdpi"]=48
            ["mipmap-hdpi"]=72
            ["mipmap-xhdpi"]=96
            ["mipmap-xxhdpi"]=144
            ["mipmap-xxxhdpi"]=192
          )

          for DIR in "${!SIZES[@]}"; do
            SIZE=${SIZES[$DIR]}
            mkdir -p "$BASE/$DIR"

            # ic_launcher — مربع بخلفية داكنة
            convert /tmp/icon_src.png \
              -resize ${SIZE}x${SIZE}^ \
              -gravity center \
              -extent ${SIZE}x${SIZE} \
              -background "#020617" \
              -flatten \
              "$BASE/$DIR/ic_launcher.png"

            # ic_launcher_round — دائري
            HALF=$((SIZE / 2))
            convert /tmp/icon_src.png \
              -resize ${SIZE}x${SIZE}^ \
              -gravity center \
              -extent ${SIZE}x${SIZE} \
              \( +clone \
                 -fill black -colorize 100 \
                 -fill white \
                 -draw "circle ${HALF},${HALF} ${HALF},0" \
              \) \
              -alpha off \
              -compose CopyOpacity \
              -composite \
              -background "#020617" \
              -flatten \
              "$BASE/$DIR/ic_launcher_round.png"

            # ic_launcher_foreground — مع padding 25% للـ Adaptive Icon
            FG_SIZE=$((SIZE * 4 / 3))
            convert /tmp/icon_fg.png \
              -resize ${SIZE}x${SIZE}^ \
              -gravity center \
              -background none \
              -extent ${FG_SIZE}x${FG_SIZE} \
              "$BASE/$DIR/ic_launcher_foreground.png" 2>/dev/null || \
            cp "$BASE/$DIR/ic_launcher.png" "$BASE/$DIR/ic_launcher_foreground.png"

            echo "  ✅ $DIR → ${SIZE}px"
          done

          # ── Adaptive Icon XML (Android 8+) ──
          mkdir -p "$BASE/mipmap-anydpi-v26"

          cat > "$BASE/mipmap-anydpi-v26/ic_launcher.xml" << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@color/ic_launcher_background"/>
              <foreground android:drawable="@mipmap/ic_launcher_foreground"/>
          </adaptive-icon>
          XMLEOF

          cat > "$BASE/mipmap-anydpi-v26/ic_launcher_round.xml" << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@color/ic_launcher_background"/>
              <foreground android:drawable="@mipmap/ic_launcher_foreground"/>
          </adaptive-icon>
          XMLEOF

          # ── لون خلفية الـ Adaptive Icon ──
          mkdir -p "$BASE/values"
          # إضافة اللون إلى colors.xml إن وجد، أو إنشاؤه
          if [ -f "$BASE/values/colors.xml" ]; then
            # إضافة اللون إن لم يكن موجوداً
            if ! grep -q "ic_launcher_background" "$BASE/values/colors.xml"; then
              sed -i 's|</resources>|    <color name="ic_launcher_background">#020617</color>\n</resources>|' \
                "$BASE/values/colors.xml"
            fi
          else
            cat > "$BASE/values/colors.xml" << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="ic_launcher_background">#020617</color>
          </resources>
          XMLEOF
          fi

          echo ""
          echo "=== الأيقونات المولّدة ==="
          find "$BASE" -name "ic_launcher*" | sort

      # ─────────────────────────────────────────
      # 7. Network Security + Manifest
      # ─────────────────────────────────────────
      - name: 🌐 Network Security Config
        run: |
          mkdir -p yalla-goal/android/app/src/main/res/xml
          cat > yalla-goal/android/app/src/main/res/xml/network_security_config.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
              <base-config cleartextTrafficPermitted="true">
                  <trust-anchors>
                      <certificates src="system"/>
                      <certificates src="user"/>
                  </trust-anchors>
              </base-config>
          </network-security-config>
          EOF

      - name: 📝 Write AndroidManifest.xml
        run: |
          cat > yalla-goal/android/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">

              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-permission android:name="android.permission.ACCESS_WIFI_STATE" />
              <uses-permission android:name="android.permission.CHANGE_NETWORK_STATE" />

              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="@string/app_name"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:supportsRtl="true"
                  android:theme="@style/AppTheme"
                  android:usesCleartextTraffic="true"
                  android:networkSecurityConfig="@xml/network_security_config">

                  <activity
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|locale|smallestScreenSize|screenLayout|uiMode"
                      android:name=".MainActivity"
                      android:label="@string/title_activity_main"
                      android:theme="@style/AppTheme.NoActionBarLaunch"
                      android:launchMode="singleTask"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>

              </application>
          </manifest>
          EOF

      # ─────────────────────────────────────────
      # 8. MainActivity.java
      # ─────────────────────────────────────────
      - name: 🛠️ Write MainActivity.java
        run: |
          MAIN_ACTIVITY=$(find yalla-goal/android -name "MainActivity.java" | head -1)
          PACKAGE=$(grep -m1 "^package" "$MAIN_ACTIVITY" | sed 's/package //;s/;//' | tr -d '[:space:]')
          echo "Package: [$PACKAGE]"

          cat > "$MAIN_ACTIVITY" << JAVAEOF
          package ${PACKAGE};

          import android.annotation.SuppressLint;
          import android.os.Bundle;
          import android.webkit.WebChromeClient;
          import android.webkit.WebResourceRequest;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import com.getcapacitor.BridgeActivity;

          public class MainActivity extends BridgeActivity {

              @Override
              @SuppressLint("SetJavaScriptEnabled")
              public void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  fixWebViewSettings();
              }

              private void fixWebViewSettings() {
                  try {
                      WebView webView = getBridge().getWebView();
                      if (webView == null) return;
                      WebSettings s = webView.getSettings();

                      // JavaScript & Storage
                      s.setJavaScriptEnabled(true);
                      s.setDomStorageEnabled(true);
                      s.setDatabaseEnabled(true);

                      // CORS
                      s.setAllowFileAccess(true);
                      s.setAllowContentAccess(true);
                      s.setAllowFileAccessFromFileURLs(true);
                      s.setAllowUniversalAccessFromFileURLs(true);

                      // Mixed content (HTTP inside HTTPS)
                      s.setMixedContentMode(WebSettings.MIXED_CONTENT_ALWAYS_ALLOW);

                      // Media
                      s.setMediaPlaybackRequiresUserGesture(false);
                      s.setLoadWithOverviewMode(true);
                      s.setUseWideViewPort(true);
                      s.setCacheMode(WebSettings.LOAD_DEFAULT);

                      // User-Agent كمتصفح حقيقي
                      s.setUserAgentString(
                          "Mozilla/5.0 (Linux; Android 13; Pixel 7) " +
                          "AppleWebKit/537.36 (KHTML, like Gecko) " +
                          "Chrome/120.0.0.0 Mobile Safari/537.36"
                      );

                      // دعم الشاشة الكاملة للفيديو
                      webView.setWebChromeClient(new WebChromeClient());

                      // السماح بكل التنقل داخل WebView
                      webView.setWebViewClient(new WebViewClient() {
                          @Override
                          public boolean shouldOverrideUrlLoading(WebView view, WebResourceRequest request) {
                              return false;
                          }
                      });

                  } catch (Exception e) {
                      e.printStackTrace();
                  }
              }
          }
          JAVAEOF

      # ─────────────────────────────────────────
      # 9. إصلاح Gradle
      # ─────────────────────────────────────────
      - name: 🔧 Fix app/build.gradle
        run: |
          cat >> yalla-goal/android/app/build.gradle << 'EOF'

          // حل تعارض Kotlin stdlib
          configurations.all {
              resolutionStrategy {
                  force "org.jetbrains.kotlin:kotlin-stdlib:1.9.0"
                  force "org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.9.0"
                  force "org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.0"
                  force "org.jetbrains.kotlin:kotlin-stdlib-common:1.9.0"
              }
          }
          EOF

      # ─────────────────────────────────────────
      # 10. تحقق نهائي قبل البناء
      # ─────────────────────────────────────────
      - name: 🔍 Pre-Build Verification
        run: |
          echo "═══ assets/public ═══"
          find yalla-goal/android/app/src/main/assets -type f 2>/dev/null

          echo ""
          echo "═══ الأيقونات ═══"
          find yalla-goal/android/app/src/main/res -name "ic_launcher*" | sort

          echo ""
          echo "═══ AndroidManifest ═══"
          cat yalla-goal/android/app/src/main/AndroidManifest.xml

      - name: 🔐 Grant Gradle Permission
        run: chmod +x yalla-goal/android/gradlew

      # ─────────────────────────────────────────
      # 11. البناء
      # ─────────────────────────────────────────
      - name: 🏗️ Build Debug APK
        run: |
          cd yalla-goal/android
          ./gradlew assembleDebug --stacktrace 2>&1 | tee /tmp/gradle_output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          if [ $EXIT_CODE -ne 0 ]; then
            echo "══════════════════════════════════════"
            echo "❌ الخطأ:"
            grep -A 5 "What went wrong\|error:\|Caused by" /tmp/gradle_output.txt | head -50
            echo "══════════════════════════════════════"
            exit 1
          fi

      - name: 🔍 Find APK
        run: |
          APK_PATH=$(find yalla-goal/android -name "*.apk" -type f | head -1)
          if [ -z "$APK_PATH" ]; then echo "❌ APK not found!"; exit 1; fi
          echo "✅ APK: $APK_PATH"
          ls -lh "$APK_PATH"
          echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: YallaGoal-v2.3-debug
          path: ${{ env.APK_PATH }}
          retention-days: 30

      - name: 📋 Upload Gradle Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: /tmp/gradle_output.txt
          retention-days: 7

      - name: ✅ Summary
        run: |
          echo "══════════════════════════════════"
          echo "✅ يلا گول APK جاهز!"
          echo "📄 HTML: index.html في assets"
          echo "🖼️  أيقونة: خلفية + ظاهرية + Adaptive"
          echo "☕ Java: 21"
          echo "🌐 CORS + Internet: ✅"
          echo "🎬 HLS/M3U8: ✅"
          echo "══════════════════════════════════"
