name: 🏗️ Build Yalla Goal APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: ☕ Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 🗂️ Create Project Structure
        run: |
          mkdir -p yalla-goal/www
          cp index.html yalla-goal/www/index.html
          cat > yalla-goal/package.json << 'EOF'
          {
            "name": "yalla-goal",
            "version": "2.3.5",
            "scripts": { "build": "echo ok" }
          }
          EOF

      - name: 📥 Install Capacitor
        run: |
          cd yalla-goal
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: ⚙️ Create Capacitor Config
        run: |
          cat > yalla-goal/capacitor.config.json << 'EOF'
          {
            "appId": "com.yallagoal.app",
            "appName": "يلا گول",
            "webDir": "www",
            "server": { "androidScheme": "https", "cleartext": true, "allowNavigation": ["*"] },
            "android": { "allowMixedContent": true }
          }
          EOF

      - name: 🤖 Add Android Platform
        run: |
          cd yalla-goal
          npx cap add android

      - name: 🔧 Fix Kotlin & Build Settings
        run: |
          APP_GRADLE="yalla-goal/android/app/build.gradle"
          # حل تعارضات Kotlin
          cat >> "$APP_GRADLE" << 'EOF'
          configurations.all {
              resolutionStrategy {
                  force "org.jetbrains.kotlin:kotlin-stdlib:1.9.0"
              }
          }
          EOF
          # تحديث نسخة الأندرويد المدعومة
          sed -i 's/targetSdkVersion [0-9]*/targetSdkVersion 34/' "$APP_GRADLE"

      - name: 🔄 Sync Capacitor
        run: |
          cd yalla-goal
          npx cap sync android

      - name: 🏗️ Build Debug APK
        run: |
          cd yalla-goal/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 🔍 Dynamic APK Finder
        id: find_apk
        run: |
          # البحث في كل المجلدات الفرعية عن أي ملف ينتهي بـ .apk
          # وتخزينه في متغير البيئة للوصول إليه في الخطوة التالية
          APK_PATH=$(find yalla-goal/android -name "*.apk" -type f | grep "debug" | head -1)
          if [ -z "$APK_PATH" ]; then 
            echo "❌ لم يتم العثور على ملف APK!"
            exit 1
          fi
          echo "Found APK at: $APK_PATH"
          echo "FINAL_APK_PATH=$APK_PATH" >> $GITHUB_ENV

      - name: 📤 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: YallaGoal-Final-v2.3.5
          path: ${{ env.FINAL_APK_PATH }}
          retention-days: 30
